<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c0a00"/>
      <stop offset="100%" style="stop-color:#431407"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#g)"/>
  <!-- Scoreboard -->
  <rect x="60" y="50" width="480" height="170" rx="12" fill="#1a0500" stroke="#ea580c" stroke-width="1.5"/>
  <rect x="60" y="50" width="480" height="38" rx="12" fill="#9a3412"/>
  <rect x="60" y="76" width="480" height="12" fill="#9a3412"/>
  <text x="300" y="74" font-family="system-ui" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">⚔️ SCOREBORD</text>
  <!-- Team rows -->
  <rect x="75" y="100" width="450" height="28" rx="6" fill="#7c2d12" opacity="0.6"/>
  <text x="100" y="119" font-family="system-ui" font-size="11" fill="#fed7aa">🥇 Team Alpha</text>
  <text x="490" y="119" font-family="system-ui" font-size="12" font-weight="700" fill="#fb923c" text-anchor="end">47 pts</text>
  <rect x="75" y="134" width="450" height="25" rx="6" fill="#451a03" opacity="0.5"/>
  <text x="100" y="151" font-family="system-ui" font-size="11" fill="#fdba74">🥈 Team Beta</text>
  <text x="490" y="151" font-family="system-ui" font-size="11" fill="#f97316" text-anchor="end">38 pts</text>
  <rect x="75" y="164" width="450" height="25" rx="6" fill="#1a0500" opacity="0.5"/>
  <text x="100" y="181" font-family="system-ui" font-size="11" fill="#fed7aa" opacity="0.7">🥉 Team Gamma</text>
  <text x="490" y="181" font-family="system-ui" font-size="11" fill="#f97316" text-anchor="end" opacity="0.7">29 pts</text>
  <!-- Wheel hint -->
  <circle cx="300" cy="248" r="22" fill="none" stroke="#ea580c" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="300" y="253" font-family="system-ui" font-size="16" text-anchor="middle">🎡</text>
  <text x="300" y="286" font-family="system-ui" font-size="11" fill="#fb923c" text-anchor="middle" opacity="0.7">Hackathon Arena</text>
