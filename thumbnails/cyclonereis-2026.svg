<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#1a2040"/>
    </linearGradient>
    <linearGradient id="mtn" x1="0%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:0.8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <!-- Mountains -->
  <polygon points="0,200 80,80 160,200" fill="url(#mtn)" opacity="0.6"/>
  <polygon points="80,200 200,40 320,200" fill="url(#mtn)" opacity="0.9"/>
  <polygon points="240,200 350,100 400,200" fill="url(#mtn)" opacity="0.5"/>
  <!-- Snow -->
