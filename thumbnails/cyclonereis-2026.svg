  <!-- Text -->
  <text x="200" y="158" font-family="system-ui,sans-serif" font-size="28" font-weight="900" fill="#2dd4bf" text-anchor="middle">🏔️ Cyclonereis</text>
  <text x="200" y="185" font-family="system-ui,sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">Annecy 2026 · 8–14 aug</text>
  <text x="200" y="210" font-family="system-ui,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Saint-Jean-de-Sixt · 12 activiteiten</text>
</svg>
